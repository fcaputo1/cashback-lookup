<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cashback Lookup — UglyCash</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f0f0f;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
  .sub { color: #888; font-size: 13px; margin-bottom: 28px; }
  .row { display: flex; gap: 10px; width: 100%; max-width: 520px; }
  input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1e1e1e;
    color: #fff;
    font-size: 14px;
    outline: none;
  }
  input:focus { border-color: #6366f1; }
  button {
    padding: 12px 24px;
    background: #6366f1;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  button:hover { background: #4f46e5; }
  button:disabled { background: #444; cursor: default; }
  .result {
    margin-top: 28px;
    width: 100%;
    max-width: 520px;
    background: #1a1a1a;
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    line-height: 1.7;
  }
  .active { color: #4ade80; }
  .inactive { color: #f87171; }
  .loading { color: #888; }
  .label { color: #888; font-size: 12px; margin-bottom: 2px; }
  .value { font-weight: 700; font-size: 17px; }
  .grid { display: flex; gap: 32px; justify-content: center; }
  .field { text-align: center; }
</style>
</head>
<body>
<h1>Cashback Lookup</h1>
<p class="sub">Ingresá el Distinct ID del usuario</p>
<div class="row">
  <input id="uid" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autofocus>
  <button id="btn" onclick="search()">Buscar</button>
</div>
<div class="result" id="result"><span class="loading">Esperando búsqueda...</span></div>

<script>
document.getElementById('uid').addEventListener('keydown', e => {
  if (e.key === 'Enter') search();
});

async function search() {
  const uid = document.getElementById('uid').value.trim();
  if (!uid) return;
  const btn = document.getElementById('btn');
  const res = document.getElementById('result');
  btn.disabled = true;
  res.innerHTML = '<span class="loading">⏳ Consultando Mixpanel...</span>';
  try {
    const r = await fetch('/api/search?id=' + encodeURIComponent(uid));
    const data = await r.json();
    if (data.error === 'not_found') {
      res.innerHTML = '<span class="inactive">❌ Usuario no encontrado<br>No tiene cashback activo.</span>';
    } else if (data.error) {
      res.innerHTML = '<span class="inactive">⚠️ ' + data.error + '</span>';
    } else {
      const rawPct = (data.actual_pct && data.actual_pct !== '—')
        ? data.actual_pct : data.cashback_current;
      const pct = rawPct && rawPct !== '—'
        ? parseFloat(rawPct).toFixed(0) + '%' : '—';
      res.innerHTML = `
        <div>
          <div class="active" style="font-size:18px;font-weight:700;margin-bottom:18px;">✅ Cashback ACTIVO</div>
          <div class="grid">
            <div class="field"><div class="label">País</div><div class="value">${data.country_name} (${data.country})</div></div>
            <div class="field"><div class="label">Porcentaje</div><div class="value">${pct}</div></div>
          </div>
        </div>`;
    }
  } catch(e) {
    res.innerHTML = '<span class="inactive">Error de conexión.</span>';
  }
  btn.disabled = false;
}
</script>
</body>
</html>
